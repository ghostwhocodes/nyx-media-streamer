name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Build, Test, and Verify Coverage
        run: ./codex/mvnw.sh verify -Pcoverage

      - name: Upload JaCoCo Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: modules/*/*/target/site/jacoco/
          retention-days: 14

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: modules/*/*/target/surefire-reports/
          retention-days: 14

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Install reactor dependencies
        run: ./codex/mvnw.sh -pl :app -am -DskipTests install
      - name: Run OWASP Dependency Check
        run: ./codex/mvnw.sh -f modules/application/app/pom.xml org.owasp:dependency-check-maven:check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: modules/application/app/target/dependency-check-report.*
          retention-days: 14

  benchmark:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install reactor dependencies
        run: ./codex/mvnw.sh -pl :app -am -Pbenchmark -DskipTests install
      - name: Run JMH Benchmarks
        run: ./codex/mvnw.sh -f modules/application/app/pom.xml -Pbenchmark test-compile jmh:benchmark
      - name: Upload JMH Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmh-results-${{ github.sha }}
          path: modules/application/app/target/reports/jmh/
          retention-days: 90
