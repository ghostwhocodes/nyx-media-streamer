server {
    host = "0.0.0.0"
    host = ${?NYX_HOST}
    port = 8080
    port = ${?NYX_PORT}

    cors {
        allowed_origins = []
        allowed_origins = ${?NYX_CORS_ORIGINS}
    }
}

compatibility {
    qloud {
        enabled = false
        enabled = ${?NYX_QLOUD_COMPAT_ENABLED}
        host = ${server.host}
        host = ${?NYX_QLOUD_COMPAT_HOST}
        port = ${?NYX_QLOUD_COMPAT_PORT}
    }
}

media {
    roots = [
        {
            path = "/media"
            path = ${?NYX_MEDIA_ROOT}
            filesystem = "local"
        }
    ]
}

ffmpeg {
    path = "ffmpeg"
    path = ${?NYX_FFMPEG_PATH}
    ffprobe_path = "ffprobe"
    ffprobe_path = ${?NYX_FFPROBE_PATH}
    min_version = "6.0"
    max_concurrent_jobs = 2
    max_concurrent_jobs = ${?NYX_MAX_CONCURRENT_JOBS}
    # Jobs that arrive when all workers are busy are held in this buffer.
    # Only rejected with 503 when both workers and buffer are full.
    max_queued_jobs = 8
    max_queued_jobs = ${?NYX_MAX_QUEUED_JOBS}
    max_concurrent_media_processes = 4
    max_concurrent_media_processes = ${?NYX_MAX_CONCURRENT_MEDIA_PROCESSES}
    quality_presets {
        low    = "h264_fast"
        medium = "h264_balanced"
        high   = "h265_quality"
    }
    watch_strategy = "polling"
    watch_strategy = ${?NYX_WATCH_STRATEGY}
    segment_watch_poll_interval_ms = 500
    segment_watch_poll_interval_ms = ${?NYX_SEGMENT_WATCH_POLL_INTERVAL_MS}
}

transcode {
    default_format = "both"
    min_free_disk_bytes = 524288000
    min_free_disk_bytes = ${?NYX_MIN_FREE_DISK_BYTES}
    # Retry: up to max_retries retries after the initial attempt, with exponential backoff
    max_retries = 3
    max_retries = ${?NYX_MAX_RETRIES}
    retry_backoff_ms = 2000
    retry_backoff_ms = ${?NYX_RETRY_BACKOFF_MS}
    # Circuit breaker: mark service degraded after N consecutive failures
    circuit_breaker_threshold = 5
    circuit_breaker_threshold = ${?NYX_CIRCUIT_BREAKER_THRESHOLD}
    segment_cache {
        grace_period_minutes = 10
        max_entries = 10000
    }
    segment_duration {
        steady_state_secs = 6
    }
}

audio {
    aac_bitrate = "256k"
    aac_bitrate = ${?NYX_AUDIO_AAC_BITRATE}
    opus_bitrate = "128k"
    opus_bitrate = ${?NYX_AUDIO_OPUS_BITRATE}
    mp3_bitrate = "192k"
    mp3_bitrate = ${?NYX_AUDIO_MP3_BITRATE}
    process_timeout_seconds = 30
    process_timeout_seconds = ${?NYX_AUDIO_PROCESS_TIMEOUT}
}

database {
    dir = "data/db"
    # NYX_DATABASE_DIR is the canonical override; NYX_DB_DIR is a compatibility alias.
    # ServerConfigLoader resolves both so canonical precedence is deterministic.
    pool_size = 4
    pool_size = ${?NYX_DB_POOL_SIZE}
    idle_timeout_ms = 600000
    idle_timeout_ms = ${?NYX_DB_IDLE_TIMEOUT_MS}
    max_lifetime_ms = 1800000
    max_lifetime_ms = ${?NYX_DB_MAX_LIFETIME_MS}
}

auth {
    enabled = false
    enabled = ${?NYX_AUTH_ENABLED}
    token = ""
    token = ${?NYX_AUTH_TOKEN}
    users {}
    tokens {}
}

quota {
    enabled = false
    enabled = ${?NYX_QUOTA_ENABLED}
    default_max_concurrent_jobs = 4
    default_max_concurrent_jobs = ${?NYX_QUOTA_MAX_CONCURRENT_JOBS}
    default_max_requests_per_minute = 60
    default_max_requests_per_minute = ${?NYX_QUOTA_MAX_RPM}
    default_max_storage_bytes = 10737418240
    default_max_storage_bytes = ${?NYX_QUOTA_MAX_STORAGE_BYTES}
    user_overrides {}
}

thumbnails {
    sizes = [150, 300, 600]
    video_offset_percent = 10
    max_cache_size_mb = 1024
    cleanup_interval_minutes = 60
}

rate_limit {
    enabled = false
    enabled = ${?NYX_RATE_LIMIT_ENABLED}
    requests_per_second = 100
    requests_per_second = ${?NYX_RATE_LIMIT_RPS}
    window_seconds = 1
    burst_size = 200
    burst_size = ${?NYX_RATE_LIMIT_BURST}
}

csrf {
    enabled = false
    enabled = ${?NYX_CSRF_ENABLED}
}

webhooks {
    enabled = false
    enabled = ${?NYX_WEBHOOKS_ENABLED}
    max_retries = 3
    max_retries = ${?NYX_WEBHOOK_MAX_RETRIES}
    retry_backoff_ms = 5000
    retry_backoff_ms = ${?NYX_WEBHOOK_RETRY_BACKOFF_MS}
    timeout_ms = 30000
    timeout_ms = ${?NYX_WEBHOOK_TIMEOUT_MS}
    max_concurrent_deliveries = 10
    max_concurrent_deliveries = ${?NYX_WEBHOOK_MAX_CONCURRENT}
    allowed_hosts = []
    delivery_retention_days = 7
    delivery_retention_days = ${?NYX_WEBHOOK_RETENTION_DAYS}
    cleanup_interval_minutes = 60
    cleanup_interval_minutes = ${?NYX_WEBHOOK_CLEANUP_INTERVAL}
}

backup {
    enabled = false
    enabled = ${?NYX_BACKUP_ENABLED}
    dir = ""
    dir = ${?NYX_BACKUP_DIR}
    schedule_interval_minutes = 0
    schedule_interval_minutes = ${?NYX_BACKUP_INTERVAL_MINUTES}
    retain_count = 5
    retain_count = ${?NYX_BACKUP_RETAIN_COUNT}
}

storage {
    backend = "local"
    backend = ${?NYX_STORAGE_BACKEND}
    local_cache_dir = "data/cache"
    local_cache_dir = ${?NYX_STORAGE_LOCAL_CACHE_DIR}
    s3 {
        bucket = ""
        bucket = ${?NYX_S3_BUCKET}
        endpoint = ""
        endpoint = ${?NYX_S3_ENDPOINT}
        region = "us-east-1"
        region = ${?NYX_S3_REGION}
        access_key = ""
        access_key = ${?NYX_S3_ACCESS_KEY}
        secret_key = ""
        secret_key = ${?NYX_S3_SECRET_KEY}
        prefix = ""
        prefix = ${?NYX_S3_PREFIX}
        path_style_access = true
    }
}

tls {
    enabled = false
    enabled = ${?NYX_TLS_ENABLED}
    keystore_path = ""
    keystore_path = ${?NYX_TLS_KEYSTORE}
    keystore_password = ""
    keystore_password = ${?NYX_TLS_KEYSTORE_PASSWORD}
    key_alias = "nyx"
    key_alias = ${?NYX_TLS_KEY_ALIAS}
    key_password = ""
    key_password = ${?NYX_TLS_KEY_PASSWORD}
    port = 8443
    port = ${?NYX_TLS_PORT}
}
