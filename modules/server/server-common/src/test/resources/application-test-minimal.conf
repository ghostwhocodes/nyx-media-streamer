// Minimal config WITHOUT auth, thumbnails, or min_free_disk_bytes
// Used to test ServerConfig defaults and catch-fallback paths

server {
    host = "localhost"
    port = 9090
    cors {
        allowed_origins = ["http://localhost"]
    }
}

media {
    roots = [
        {
            path = "/tmp"
        }
    ]
}

ffmpeg {
    path = "ffmpeg"
    ffprobe_path = "ffprobe"
    min_version = "6.0"
    max_concurrent_jobs = 2
}

transcode {
    default_format = "dash"
    segment_cache {
        grace_period_minutes = 10
    }
    segment_duration {
        steady_state_secs = 6
    }
}

database {
    dir = "/tmp/test-db-minimal"
}
