// Standalone config with storage section but NO s3 sub-section.
// This triggers the no-S3 fallback branch in ServerConfig.java.
//   sc.config("s3") throws → catch → S3Config()

server {
    host = "0.0.0.0"
    port = 8080
    cors {
        allowed_origins = []
    }
}

media {
    roots = [
        {
            path = "/tmp/nyx-test-media"
        }
    ]
}

ffmpeg {
    path = "/usr/bin/ffmpeg"
    ffprobe_path = "/usr/bin/ffprobe"
    min_version = "4.0"
    max_concurrent_jobs = 2
}

transcode {
    default_format = "hls"
    segment_cache {
        grace_period_minutes = 5
        max_entries = 1000
    }
    segment_duration {
        steady_state_secs = 6
    }
}

database {
    dir = "/tmp/nyx-test-db"
}

storage {
    backend = "local"
    local_cache_dir = "data/cache"
    // Deliberately omitting 's3' sub-section
}
