include "application.conf"

# Prod overrides: enable security controls, stricter rate limits
rate_limit {
    enabled             = true
    enabled             = ${?NYX_RATE_LIMIT_ENABLED}
    requests_per_second = 50
    requests_per_second = ${?NYX_RATE_LIMIT_RPS}
    burst_size          = 100
    burst_size          = ${?NYX_RATE_LIMIT_BURST}
}
csrf {
    enabled = true
    enabled = ${?NYX_CSRF_ENABLED}
}
storage {
    backend = "local"
    backend = ${?NYX_STORAGE_BACKEND}
}
