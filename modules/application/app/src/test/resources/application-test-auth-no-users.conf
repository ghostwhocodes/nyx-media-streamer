// Standalone config with auth section that has enabled/token but NO users/tokens sub-sections.
// This triggers the missing-users fallback branches in ServerConfig.java.
//   authConf.config("users") throws → catch → emptyMap()
//   authConf.config("tokens") throws → catch → emptyMap()

server {
    host = "0.0.0.0"
    port = 8080
    cors {
        allowed_origins = []
    }
}

media {
    roots = [
        {
            path = "/tmp/nyx-test-media"
        }
    ]
}

ffmpeg {
    path = "/usr/bin/ffmpeg"
    ffprobe_path = "/usr/bin/ffprobe"
    min_version = "4.0"
    max_concurrent_jobs = 2
}

transcode {
    default_format = "hls"
    segment_cache {
        grace_period_minutes = 5
        max_entries = 1000
    }
    segment_duration {
        steady_state_secs = 6
    }
}

database {
    dir = "/tmp/nyx-test-db"
}

auth {
    enabled = true
    token = "test-token-no-users"
    // Deliberately omitting 'users' and 'tokens' sub-sections
}
