include "application.conf"

auth {
    enabled = true
    token = "test-token"
    users {
        admin = "fakehash1"
        editor = "fakehash2"
    }
    tokens {
        apikey123 = "user1"
        apikey456 = "user2"
    }
}

quota {
    enabled = true
    default_max_concurrent_jobs = 8
    default_max_requests_per_minute = 120
    default_max_storage_bytes = 21474836480
    user_overrides {
        power_user {
            max_concurrent_jobs = 16
            max_requests_per_minute = 300
            max_storage_bytes = 107374182400
        }
        basic_user {
            max_concurrent_jobs = 2
        }
    }
}
