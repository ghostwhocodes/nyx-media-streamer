// Standalone config with webhooks section that has allowed_hosts populated.
// This triggers webhook host parsing in ServerConfig.java.

server {
    host = "0.0.0.0"
    port = 8080
    cors {
        allowed_origins = []
    }
}

media {
    roots = [
        {
            path = "/tmp/nyx-test-media"
        }
    ]
}

ffmpeg {
    path = "/usr/bin/ffmpeg"
    ffprobe_path = "/usr/bin/ffprobe"
    min_version = "4.0"
    max_concurrent_jobs = 2
}

transcode {
    default_format = "hls"
    segment_cache {
        grace_period_minutes = 5
        max_entries = 1000
    }
    segment_duration {
        steady_state_secs = 6
    }
}

database {
    dir = "/tmp/nyx-test-db"
}

webhooks {
    enabled = true
    allowed_hosts = ["host1.example.com", "host2.example.com", "api.example.org"]
}
